<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON COLLECTOR PRO</title>
    <style>
        /* If this CSS works, the screen MUST turn dark blue/black */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #050508 !important; 
            font-family: sans-serif; 
        }
        canvas { display: block; background: #000; touch-action: none; }
        #ui {
            position: absolute; width: 100%; top: 20px; display: flex; 
            justify-content: space-around; color: #0ff; font-weight: bold; 
            text-shadow: 0 0 10px #0ff; pointer-events: none; font-size: 24px;
        }
        #msg {
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); text-align: center; 
            color: #fff; pointer-events: none; 
            text-shadow: 0 0 15px #ff00ff;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div>SCORE: <span id="score">0</span></div>
        <div>GOLD: <span id="coins">0</span></div>
    </div>

    <div id="msg">
        <h1 id="title">NEON COLLECTOR</h1>
        <p id="sub">CLICK TO START</p>
    </div>

    <canvas id="game"></canvas>

<script>
    // SAFETY CHECK: This will pop up an alert if the script actually runs
    console.log("Script starting...");

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const coinEl = document.getElementById('coins');
    const msg = document.getElementById('msg');

    let w, h, player, obstacles, coins, score, totalCoins, isRunning, frame;
    const CONSTANT_SPEED = 7.5; 
    const PLAYER_SIZE = 30;
    const MARGIN = 60; 

    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        reset();
    }

    function reset() {
        score = 0; totalCoins = 0; isRunning = false;
        obstacles = []; coins = []; frame = 0;
        player = {
            x: w * 0.2, y: h - MARGIN - PLAYER_SIZE,
            gravity: 1, ease: 0.2, color: '#0ff'
        };
        scoreEl.innerText = "0";
        coinEl.innerText = "0";
        msg.style.display = 'block';
        draw();
    }

    function spawnLogic() {
        const spawnGap = Math.max(35, 90 - Math.floor(score / 40));
        if (frame % spawnGap === 0) {
            const isTop = Math.random() > 0.5;
            const obsH = 60 + Math.random() * 100;
            obstacles.push({ x: w, y: isTop ? MARGIN : h - obsH - MARGIN, w: 35, h: obsH });
            coins.push({ x: w + 10, y: isTop ? (h - MARGIN - 15) : (MARGIN + 15), radius: 10 });
        }
    }

    function update() {
        if (!isRunning) return;
        frame++; score += 0.1;
        scoreEl.innerText = Math.floor(score);
        const targetY = (player.gravity === 1) ? (h - MARGIN - PLAYER_SIZE) : MARGIN;
        player.y += (targetY - player.y) * player.ease;

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i]; o.x -= CONSTANT_SPEED;
            if (player.x + 5 < o.x + o.w && player.x + PLAYER_SIZE - 5 > o.x &&
                player.y + 5 < o.y + o.h && player.y + PLAYER_SIZE - 5 > o.y) {
                isRunning = false;
                document.getElementById('title').innerText = "GAME OVER";
                msg.style.display = 'block';
            }
            if (o.x + o.w < 0) obstacles.splice(i, 1);
        }

        for (let i = coins.length - 1; i >= 0; i--) {
            let c = coins[i]; c.x -= CONSTANT_SPEED;
            let dx = (player.x + PLAYER_SIZE/2) - c.x;
            let dy = (player.y + PLAYER_SIZE/2) - c.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 80) { c.x += (player.x - c.x) * 0.2; c.y += (player.y - c.y) * 0.2; }
            if (dist < PLAYER_SIZE) { totalCoins++; score += 100; coinEl.innerText = totalCoins; coins.splice(i, 1); }
            else if (c.x + 50 < 0) coins.splice(i, 1);
        }
        spawnLogic(); draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.fillStyle = '#050508';
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = '#1a1a2e'; ctx.lineWidth = 4;
        ctx.strokeRect(0, MARGIN, w, h - (MARGIN * 2));
        ctx.fillStyle = '#ffd700';
        coins.forEach(c => { ctx.beginPath(); ctx.arc(c.x, c.y, c.radius, 0, Math.PI*2); ctx.fill(); });
        ctx.fillStyle = '#ff00ff';
        obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, PLAYER_SIZE, PLAYER_SIZE);
    }

    function handleInput(e) {
        if (!isRunning) { reset(); isRunning = true; msg.style.display = 'none'; update(); }
        else { player.gravity *= -1; }
    }

    window.addEventListener('resize', init);
    window.addEventListener('mousedown', handleInput);
    window.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(); }, {passive: false});
    init();
</script>
</body>
</html>
