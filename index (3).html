<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON COLLECTOR PRO</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050508; font-family: 'Courier New', monospace; }
        canvas { display: block; touch-action: none; }
        #ui {
            position: absolute; width: 100%; top: 20px; display: flex; justify-content: space-around;
            color: #0ff; font-weight: bold; text-shadow: 0 0 10px #0ff; pointer-events: none; font-size: 24px;
        }
        #msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: #fff; pointer-events: none; text-shadow: 0 0 15px #ff00ff;
        }
        .coin-text { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
    </style>
</head>
<body>

    <div id="ui">
        <div>SCORE: <span id="score">0</span></div>
        <div class="coin-text">GOLD: <span id="coins">0</span></div>
    </div>

    <div id="msg">
        <h1 id="title">NEON COLLECTOR</h1>
        <p id="sub">FLIP TO COLLECT SNAPPED COINS</p>
    </div>

    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const coinEl = document.getElementById('coins');
    const msg = document.getElementById('msg');

    let w, h, player, obstacles, coins, score, totalCoins, isRunning, frame;
    
    const CONSTANT_SPEED = 7.5; 
    const PLAYER_SIZE = 30;
    const MARGIN = 60; 

    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        reset();
    }

    function reset() {
        score = 0;
        totalCoins = 0;
        isRunning = false;
        obstacles = [];
        coins = [];
        frame = 0;
        player = {
            x: w * 0.2,
            y: h - MARGIN - PLAYER_SIZE,
            gravity: 1, 
            ease: 0.2,
            color: '#0ff'
        };
        scoreEl.innerText = "0";
        coinEl.innerText = "0";
        msg.style.display = 'block';
        draw();
    }

    function spawnLogic() {
        // Density increases every 100 points
        const spawnGap = Math.max(35, 90 - Math.floor(score / 40));
        
        if (frame % spawnGap === 0) {
            const isTop = Math.random() > 0.5;
            const obsH = 60 + Math.random() * 100;
            const obsW = 35;
            
            obstacles.push({
                x: w,
                y: isTop ? MARGIN : h - obsH - MARGIN,
                w: obsW,
                h: obsH
            });

            // COIN FIX: Snap coins directly to the ceiling or floor
            // If obstacle is TOP, coin is BOTTOM. If obstacle is BOTTOM, coin is TOP.
            coins.push({
                x: w + 10,
                y: isTop ? (h - MARGIN - 15) : (MARGIN + 15),
                radius: 10,
                collected: false
            });
        }
    }

    function update() {
        if (!isRunning) return;

        frame++;
        score += 0.1;
        scoreEl.innerText = Math.floor(score);

        const targetY = (player.gravity === 1) ? (h - MARGIN - PLAYER_SIZE) : MARGIN;
        player.y += (targetY - player.y) * player.ease;

        // Update Obstacles
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.x -= CONSTANT_SPEED;
            
            // Hitbox relaxation (5px padding for fairness)
            if (player.x + 5 < o.x + o.w && player.x + PLAYER_SIZE - 5 > o.x &&
                player.y + 5 < o.y + o.h && player.y + PLAYER_SIZE - 5 > o.y) {
                endGame();
            }
            if (o.x + o.w < 0) obstacles.splice(i, 1);
        }

        // Update Coins
        for (let i = coins.length - 1; i >= 0; i--) {
            let c = coins[i];
            c.x -= CONSTANT_SPEED;

            // Magnet effect: If player is on the same rail as coin and close
            let dx = (player.x + PLAYER_SIZE/2) - c.x;
            let dy = (player.y + PLAYER_SIZE/2) - c.y;
            let distance = Math.sqrt(dx*dx + dy*dy);

            // Larger collection radius (Magnetism)
            if (distance < 60) {
                c.x += (player.x - c.x) * 0.2;
                c.y += (player.y - c.y) * 0.2;
            }

            if (distance < PLAYER_SIZE) {
                totalCoins++;
                score += 100; 
                coinEl.innerText = totalCoins;
                coins.splice(i, 1);
            } else if (c.x + 20 < 0) {
                coins.splice(i, 1);
            }
        }

        spawnLogic();
        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.fillStyle = '#050508';
        ctx.fillRect(0, 0, w, h);

        // Track Rails
        ctx.strokeStyle = '#1a1a2e';
        ctx.lineWidth = 4;
        ctx.strokeRect(0, MARGIN, w, h - (MARGIN * 2));

        // Coins
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#ffd700';
        ctx.fillStyle = '#ffd700';
        coins.forEach(c => {
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.radius, 0, Math.PI * 2);
            ctx.fill();
        });

        // Obstacles
        ctx.shadowColor = '#ff00ff';
        ctx.fillStyle = '#ff00ff';
        obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));

        // Player
        ctx.shadowColor = player.color;
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, PLAYER_SIZE, PLAYER_SIZE);
        
        ctx.shadowBlur = 0;
    }

    function endGame() {
        isRunning = false;
        msg.style.display = 'block';
        document.getElementById('title').innerText = "SYSTEM FAILURE";
        document.getElementById('sub').innerText = "FINAL SCORE: " + Math.floor(score);
    }

    function handleInput() {
        if (!isRunning) {
            reset();
            isRunning = true;
            msg.style.display = 'none';
            update();
        } else {
            player.gravity *= -1;
        }
    }

    window.addEventListener('resize', init);
    window.addEventListener('mousedown', handleInput);
    window.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(); }, {passive: false});
    window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleInput(); });

    init();
</script>
</body>
</html>
